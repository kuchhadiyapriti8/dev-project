<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up - Login Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <div class="container">
      <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-md-auto col-lg-5 col-xl-4">
            <div class="bg-dark text-white border border-bottom-0 rounded-top text-center">
                <h1 class="p-3 m-0">Sign Up</h1>
            </div>
            <div class="bg-white border container">
                {% if errors %}
                  <div class="alert alert-danger m-3" role="alert">
                      <ul class="mb-0">
                          {% for error in errors.values() %}
                              <li>{{ error }}</li>
                          {% endfor %}
                      </ul>
                  </div>
                {% endif %}

                <form class="p-3" action="{{ url_for('signup') }}" method="post">
                  <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                  </div>

                  <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                  </div>

                  <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                  </div>

                  <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                  </div>

                  <div class="mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" required>
                  </div>

                  <div class="mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" required>
                  </div>

                  <div class="mb-3">
                    <label for="location" class="form-label">Location</label>
                    <input type="text" class="form-control" id="location" name="location" required>
                  </div>

                  <div class="text-center">
                    <button type="submit" class="btn btn-primary">Register</button>
                  </div>
                </form>
            </div>

            <div class="bg-white border border-top-0 rounded-bottom text-center">
                <div class="p-2">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
            </div>
        </div>
      </div>
    </div>
  </body>
</html>
